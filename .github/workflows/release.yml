name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Cross-compile
        env:
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for t in $targets; do
            os="${t%/*}"; arch="${t#*/}"
            bin="gdf"; [ "$os" = "windows" ] && bin="gdf.exe"
            echo "==> $os/$arch"
            GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" -o "$bin" .
            if [ "$os" = "windows" ]; then
              zip -q "dist/gdf_${VERSION}_${os}_${arch}.zip" "$bin"
            else
              tar -czf "dist/gdf_${VERSION}_${os}_${arch}.tar.gz" "$bin"
            fi
            rm -f "$bin"
          done
          ( cd dist && sha256sum * > checksums.txt )
          ls -la dist

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
