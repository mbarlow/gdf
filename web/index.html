<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gdf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=SUSE+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/tomorrow-night.min.css" disabled />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <rect x="2" y="3" width="8.5" height="18" rx="1.5" />
        <rect x="13.5" y="3" width="8.5" height="18" rx="1.5" />
      </svg>
      <span>gdf</span>
    </div>
    <div class="file">
      <span id="filename"></span>
      <span id="lang" class="badge"></span>
    </div>
    <div class="actions">
      <span id="status" class="status"></span>
      <button id="quick-ours" class="btn ghost" title="Take ours for every conflict">all ours</button>
      <button id="quick-theirs" class="btn ghost" title="Take theirs for every conflict">all theirs</button>
      <button id="theme-toggle" class="btn icon" title="Toggle theme" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.4 5.4 0 0 1-7.54-7.54c-.44-.06-.9-.1-1.36-.1Z"/></svg>
      </button>
      <button id="merge-btn" class="btn primary">Merge &amp; Apply</button>
      <button id="abort-btn" class="btn danger">Abort</button>
    </div>
  </header>

  <div id="panehead">
    <div class="pane left">
      <span class="branch" id="left-label"></span>
      <span class="sub" id="left-sub"></span>
    </div>
    <div class="pane right">
      <span class="branch" id="right-label"></span>
      <span class="sub" id="right-sub"></span>
    </div>
  </div>

  <main id="diff"></main>

  <script src="/app.js"></script>
</body>
</html>
